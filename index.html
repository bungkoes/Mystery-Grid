<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mystery Grid Reveal</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- Setup Page -->
        <section id="setup-page" class="page active">
            <div class="glass-card">
                <h1>Game Setup</h1>
                <p>Click start to reveal the mystery grid.</p>
                <form id="setup-form">
                    <button type="submit" class="btn-primary">Start Game</button>
                </form>
            </div>
        </section>

        <!-- Game Page -->
        <section id="game-page" class="page">
            <header>
                <h2>Mystery Grid</h2>
                <button id="btn-back" class="btn-secondary">New Game</button>
            </header>
            <div class="grid-container-wrapper">
                <div id="grid-container"></div>
            </div>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
